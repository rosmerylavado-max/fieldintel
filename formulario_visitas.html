<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Field Intel · Registro de Visita</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root{--bg:#f2f5fb;--surface:#fff;--surface2:#f7f9fd;--border:#dde4f0;--accent:#1a6eff;--softys:#1a6eff;--comp:#f05a1a;--text:#1a2140;--muted:#8090b0;--success:#00a86b;--error:#d92447;}
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding:0 0 60px;}
  .header{background:#fff;border-bottom:1px solid var(--border);padding:16px 24px 12px;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(26,64,255,.07);}
  .header-top{display:flex;align-items:center;gap:10px;margin-bottom:4px;}
  .logo{font-family:'Space Mono',monospace;font-size:10px;color:var(--accent);letter-spacing:3px;}
  .status-dot{width:8px;height:8px;border-radius:50%;background:#ccc;transition:background .3s;}
  .status-dot.ok{background:var(--success);animation:pulse 2s infinite;}
  .status-dot.err{background:var(--error);}
  @keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(1.3)}}
  .status-txt{font-size:10px;color:var(--muted);letter-spacing:1px;font-family:'Space Mono',monospace;}
  h1{font-size:20px;font-weight:700;} h1 span{color:var(--accent);}
  .counter-badge{display:inline-flex;align-items:center;gap:5px;background:rgba(0,168,107,.1);border:1px solid rgba(0,168,107,.2);border-radius:20px;padding:3px 10px;font-family:'Space Mono',monospace;font-size:10px;color:var(--success);margin-top:5px;}
  .container{max-width:600px;margin:0 auto;padding:20px 16px;}
  .section-label{font-family:'Space Mono',monospace;font-size:9px;letter-spacing:3px;color:var(--muted);text-transform:uppercase;margin-bottom:10px;margin-top:22px;}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:18px;margin-bottom:14px;box-shadow:0 1px 6px rgba(26,64,255,.04);}
  .card.accent-softys{border-left:3px solid var(--softys);}
  .card.accent-comp{border-left:3px solid var(--comp);}
  .field-group{margin-bottom:13px;}.field-group:last-child{margin-bottom:0;}
  label{display:block;font-size:11px;font-weight:600;color:var(--muted);margin-bottom:5px;letter-spacing:.5px;text-transform:uppercase;}
  label span.req{color:var(--accent);}
  input,select,textarea{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:15px;padding:10px 13px;outline:none;transition:border-color .2s,box-shadow .2s;-webkit-appearance:none;}
  input:focus,select:focus,textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(26,110,255,.1);}
  input[type="number"]{font-family:'Space Mono',monospace;}
  textarea{resize:vertical;min-height:76px;font-size:14px;}
  .grid-2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  .sku-row{display:flex;gap:7px;align-items:flex-end;margin-bottom:9px;background:var(--surface2);border-radius:10px;padding:12px;border:1px solid var(--border);}
  .sku-row .fm{flex:1;}
  .sku-row label{font-size:9px;margin-bottom:4px;}
  .sku-row input,.sku-row select{font-size:13px;padding:7px 9px;}
  .remove-btn{background:rgba(217,36,71,.07);border:1px solid rgba(217,36,71,.2);color:var(--error);border-radius:6px;width:28px;height:28px;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-bottom:1px;}
  .add-btn{width:100%;padding:9px;background:transparent;border:1.5px dashed var(--border);border-radius:8px;color:var(--muted);font-size:13px;cursor:pointer;transition:all .2s;font-family:'DM Sans',sans-serif;margin-top:3px;}
  .add-btn:hover{border-color:var(--accent);color:var(--accent);}
  .sku-header{display:flex;align-items:center;gap:10px;margin-bottom:12px;}
  .badge{font-family:'Space Mono',monospace;font-size:10px;font-weight:700;padding:3px 10px;border-radius:20px;letter-spacing:1px;}
  .badge.s{background:rgba(26,110,255,.1);color:var(--softys);border:1px solid rgba(26,110,255,.22);}
  .badge.c{background:rgba(240,90,26,.1);color:var(--comp);border:1px solid rgba(240,90,26,.22);}
  .price-calc{background:rgba(26,110,255,.05);border:1px solid rgba(26,110,255,.12);border-radius:7px;padding:7px 11px;margin-top:5px;font-family:'Space Mono',monospace;font-size:10px;color:var(--accent);display:none;}
  .price-calc.v{display:block;}
  .submit-btn{width:100%;padding:15px;background:linear-gradient(135deg,#1a6eff,#004ecc);border:none;border-radius:10px;color:#fff;font-family:'Space Mono',monospace;font-size:13px;font-weight:700;letter-spacing:2px;cursor:pointer;transition:all .2s;margin-top:18px;box-shadow:0 4px 16px rgba(26,110,255,.28);}
  .submit-btn:hover{transform:translateY(-1px);}
  .submit-btn:disabled{opacity:.5;cursor:not-allowed;transform:none;}
  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--success);color:#fff;padding:11px 22px;border-radius:10px;font-family:'Space Mono',monospace;font-size:11px;font-weight:700;letter-spacing:1px;transition:transform .3s cubic-bezier(.34,1.56,.64,1);z-index:1000;white-space:nowrap;box-shadow:0 4px 16px rgba(0,0,0,.15);}
  .toast.show{transform:translateX(-50%) translateY(0);}
  .toast.err{background:var(--error);}
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <span class="logo">Field Intel</span>
    <div style="display:flex;align-items:center;gap:5px;margin-left:auto;">
      <div class="status-dot" id="statusDot"></div>
      <span class="status-txt" id="statusTxt">CONECTANDO...</span>
    </div>
  </div>
  <h1>Registro de <span>Visita</span> a Campo</h1>
  <div class="counter-badge">✓ <span id="visitCount">—</span> visitas en la BD</div>
</div>

<div class="container">
  <div class="section-label">📍 Datos de la visita</div>
  <div class="card">
    <div class="grid-2">
      <div class="field-group"><label>Fecha <span class="req">*</span></label><input type="date" id="fecha"/></div>
      <div class="field-group"><label>Hora</label><input type="time" id="hora"/></div>
    </div>
    <div class="field-group"><label>Punto de venta <span class="req">*</span></label><input type="text" id="pdv" placeholder="Ej: Bodega Don Carlos"/></div>
    <div class="grid-2">
      <div class="field-group"><label>Distrito <span class="req">*</span></label><input type="text" id="distrito" placeholder="Ej: Miraflores"/></div>
      <div class="field-group"><label>Canal</label>
        <select id="canal">
          <option value="">Seleccionar</option>
          <option>Bodega independiente</option><option>Minimarket</option>
          <option>Mercado de abastos</option><option>Supermercado</option>
          <option>Farmacia</option><option>Otro</option>
        </select>
      </div>
    </div>
    <div class="field-group"><label>Ejecutivo</label><input type="text" id="ejecutivo" placeholder="Tu nombre"/></div>
  </div>

  <div class="section-label">🔵 SKUs Softys</div>
  <div class="card accent-softys">
    <div class="sku-header"><span class="badge s">SOFTYS</span><span style="font-size:12px;color:var(--muted)">Productos propios encontrados</span></div>
    <div id="softys-skus"></div>
    <button class="add-btn" onclick="addSku('softys')">+ Agregar SKU Softys</button>
  </div>

  <div class="section-label">🟠 SKUs Competencia</div>
  <div class="card accent-comp">
    <div class="sku-header"><span class="badge c">COMPETENCIA</span><span style="font-size:12px;color:var(--muted)">Productos competidores</span></div>
    <div id="comp-skus"></div>
    <button class="add-btn" onclick="addSku('comp')">+ Agregar SKU competencia</button>
  </div>

  <div class="section-label">📝 Observaciones</div>
  <div class="card">
    <div class="field-group"><label>Hallazgos cualitativos</label><textarea id="obs" placeholder="Ej: Bodeguero menciona promoción 2x1 de competencia..."></textarea></div>
    <div class="field-group"><label>Exhibición Softys</label>
      <select id="exhibicion">
        <option value="">Seleccionar</option>
        <option>Excelente - posición preferente</option><option>Bueno - visible en góndola</option>
        <option>Regular - posición secundaria</option><option>Malo - difícil de encontrar</option>
        <option>Sin stock</option>
      </select>
    </div>
  </div>
  <button class="submit-btn" onclick="submitForm()" id="submitBtn">⬆ REGISTRAR VISITA</button>
</div>
<div class="toast" id="toast"></div>

<script>
var API = "https://script.google.com/macros/s/AKfycbyIDmneL5AeksDsjRYg0GcmotDInnDcYHg1uLxydMVRw3EjD2eFXzBO_LGed3jgo9ts/exec";
var cnt = {softys:0, comp:0};

// ── JSONP: única forma de llamar Apps Script sin CORS ──
function jsonp(url, callback) {
  var name = 'cb_' + Date.now();
  window[name] = function(data) {
    delete window[name];
    document.getElementById('jsonp-script') && document.getElementById('jsonp-script').remove();
    callback(data);
  };
  var s = document.createElement('script');
  s.id = 'jsonp-script';
  s.src = url + (url.indexOf('?') >= 0 ? '&' : '?') + 'callback=' + name;
  s.onerror = function() {
    delete window[name];
    s.remove();
    callback(null);
  };
  document.head.appendChild(s);
}

function checkConnection() {
  jsonp(API + '?action=load', function(data) {
    if (data && data.ok) {
      document.getElementById('statusDot').className = 'status-dot ok';
      document.getElementById('statusTxt').textContent = 'CONECTADO';
      document.getElementById('visitCount').textContent = data.data.length;
    } else {
      document.getElementById('statusDot').className = 'status-dot err';
      document.getElementById('statusTxt').textContent = 'ERROR';
    }
  });
}

function addSku(type) {
  var id = ++cnt[type];
  var con = document.getElementById(type + '-skus');
  var brands = type === 'softys'
    ? ['Elite','Nova','Suave','Favorit','Higienol','Ladysoft','Otro']
    : ['Nosotras','Suave','Scott','Kleenex','Familia','Rosal','Aro','Otro'];
  var d = document.createElement('div');
  d.className = 'sku-row'; d.id = type + '-' + id;
  d.innerHTML =
    '<div class="fm" style="flex:2"><label>Marca/SKU</label>' +
    '<select class="b" data-t="' + type + '" data-i="' + id + '"><option value="">—</option>' +
    brands.map(function(b){ return '<option>' + b + '</option>'; }).join('') + '</select></div>' +
    '<div class="fm"><label>Q rollos/paq.</label><input type="number" min="1" class="q" data-t="' + type + '" data-i="' + id + '" placeholder="4" oninput="cp(\'' + type + '\',\'' + id + '\')"/></div>' +
    '<div class="fm"><label>Metros/rollo</label><input type="number" min="1" step="0.5" class="m" data-t="' + type + '" data-i="' + id + '" placeholder="20" oninput="cp(\'' + type + '\',\'' + id + '\')"/></div>' +
    '<div class="fm"><label>Precio paq.(S/)</label><input type="number" min="0" step="0.01" class="p" data-t="' + type + '" data-i="' + id + '" placeholder="0.00" oninput="cp(\'' + type + '\',\'' + id + '\')"/></div>' +
    '<button class="remove-btn" onclick="rmSku(\'' + type + '\',\'' + id + '\')">×</button>';
  con.appendChild(d);
  var c = document.createElement('div');
  c.className = 'price-calc'; c.id = 'pc-' + type + '-' + id;
  con.appendChild(c);
}

function cp(t, i) {
  var q = parseFloat(document.querySelector('.q[data-t="'+t+'"][data-i="'+i+'"]').value)||0;
  var m = parseFloat(document.querySelector('.m[data-t="'+t+'"][data-i="'+i+'"]').value)||0;
  var p = parseFloat(document.querySelector('.p[data-t="'+t+'"][data-i="'+i+'"]').value)||0;
  var el = document.getElementById('pc-'+t+'-'+i);
  if(el && q>0 && p>0){el.classList.add('v');el.textContent='P/rollo: S/'+(p/q).toFixed(2)+(m>0?'  ·  P/metro: S/'+(p/(q*m)).toFixed(3):'');}
  else if(el) el.classList.remove('v');
}

function rmSku(t,i){
  var a=document.getElementById(t+'-'+i); if(a)a.remove();
  var b=document.getElementById('pc-'+t+'-'+i); if(b)b.remove();
}

function collectSkus(type) {
  var skus = [];
  document.querySelectorAll('.q[data-t="'+type+'"]').forEach(function(el) {
    var i = el.dataset.i;
    var brand = document.querySelector('.b[data-t="'+type+'"][data-i="'+i+'"]').value||'';
    var q = parseFloat(el.value)||null;
    var metros = parseFloat(document.querySelector('.m[data-t="'+type+'"][data-i="'+i+'"]').value)||null;
    var pp = parseFloat(document.querySelector('.p[data-t="'+type+'"][data-i="'+i+'"]').value)||null;
    if(!brand && !q && !pp) return;
    skus.push({brand:brand, q_rollos:q, metros:metros, precio_paquete:pp,
      precio_rollo:(q&&pp)?Math.round(pp/q*1000)/1000:null,
      precio_metro:(q&&metros&&pp)?Math.round(pp/(q*metros)*10000)/10000:null});
  });
  return skus;
}

function submitForm() {
  var fecha = document.getElementById('fecha').value;
  var pdv = document.getElementById('pdv').value.trim();
  var distrito = document.getElementById('distrito').value.trim();
  if(!fecha||!pdv||!distrito){showToast('Completa los campos requeridos (*)',true);return;}
  var ss = collectSkus('softys'), cs = collectSkus('comp');
  if(!ss.length&&!cs.length){showToast('Agrega al menos un SKU',true);return;}

  var btn = document.getElementById('submitBtn');
  btn.disabled = true; btn.textContent = 'GUARDANDO...';

  var visit = {
    fecha:fecha, hora:document.getElementById('hora').value,
    pdv:pdv, distrito:distrito,
    canal:document.getElementById('canal').value,
    ejecutivo:document.getElementById('ejecutivo').value,
    softys_skus:ss, comp_skus:cs,
    observaciones:document.getElementById('obs').value,
    exhibicion:document.getElementById('exhibicion').value
  };

  // Codificar los datos en la URL para enviarlos via JSONP (GET)
  var params = encodeURIComponent(JSON.stringify(visit));
  jsonp(API + '?action=save&visit=' + params, function(data) {
    if(data && data.ok){
      showToast('✓ VISITA GUARDADA EN GOOGLE SHEETS');
      resetForm();
    } else {
      showToast('Error al guardar. Intenta de nuevo.', true);
    }
    btn.disabled = false; btn.textContent = '⬆ REGISTRAR VISITA';
  });
}

function resetForm() {
  document.getElementById('pdv').value='';
  document.getElementById('obs').value='';
  document.getElementById('canal').value='';
  document.getElementById('exhibicion').value='';
  document.getElementById('softys-skus').innerHTML='';
  document.getElementById('comp-skus').innerHTML='';
  cnt={softys:0,comp:0};
  addSku('softys'); addSku('comp');
  document.getElementById('hora').value=new Date().toTimeString().slice(0,5);
  checkConnection();
}

function showToast(msg,isErr){
  var t=document.getElementById('toast');
  t.textContent=msg; t.className='toast'+(isErr?' err':'');
  t.classList.add('show'); setTimeout(function(){t.classList.remove('show');},3500);
}

window.addEventListener('load', function(){
  var now=new Date();
  document.getElementById('fecha').value=now.toISOString().split('T')[0];
  document.getElementById('hora').value=now.toTimeString().slice(0,5);
  addSku('softys'); addSku('comp');
  checkConnection();
});
</script>
</body>
</html>
